<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>J&J — AM Quarterly Bonus Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --dark:#1C2E23;--pink:#E03189;--lime:#84BD00;--midgreen:#7BB223;
  --offwhite:#F4F6F4;--muted:#8AA898;--border:#E2EAE4;--text:#1C2E23;
  --amber:#F5A623;--red:#E83B3B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh;}
.header{background:var(--dark);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--lime);}
.pill{display:inline-block;background:var(--pink);color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 12px;border-radius:20px;margin-bottom:5px;}
.header h1{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;font-weight:400;}
.header-sub{color:var(--lime);font-size:11px;letter-spacing:1px;margin-top:1px;}
.year-badge{background:rgba(132,189,0,.15);border:1px solid var(--lime);color:var(--lime);font-size:12px;font-weight:700;padding:6px 16px;border-radius:8px;}
.app{display:flex;height:calc(100vh - 69px);}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--dark);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;}
.sb-section{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);padding:16px 18px 8px;}
.sb-people{flex:1;overflow-y:auto;}
.sb-person{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;position:relative;}
.sb-person:hover{background:rgba(255,255,255,.05);}
.sb-person.active{background:rgba(132,189,0,.1);border-left-color:var(--lime);}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:13px;color:#fff;flex-shrink:0;border:2px solid transparent;transition:border-color .15s;}
.sb-person.active .sb-avatar{border-color:var(--lime);}
.sb-info{flex:1;min-width:0;}
.sb-name{color:#fff;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-role{color:var(--muted);font-size:10px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;min-width:20px;text-align:center;}
.sb-edit{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 4px;}
.sb-person:hover .sb-edit{opacity:1;}
.sb-add-btn{margin:10px 14px;padding:9px;background:rgba(224,49,137,.12);border:1px dashed rgba(224,49,137,.5);color:var(--pink);font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center;}
.sb-add-btn:hover{background:rgba(224,49,137,.2);}
.q-section{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);}
.q-label{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:7px;}
.q-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.q-btn{padding:6px 2px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-size:11px;font-weight:600;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;transition:all .15s;}
.q-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.q-btn.active{background:var(--lime);border-color:var(--lime);color:var(--dark);}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 32px;min-width:0;}
.panel{display:none;}
.panel.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* PERSON HEADER */
.person-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.person-name{font-family:'DM Serif Display',serif;font-size:26px;color:var(--dark);}
.person-role{color:var(--muted);font-size:12px;margin-top:2px;}
.person-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.qpill{background:var(--dark);color:var(--lime);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:1px;}
.action-btn{padding:6px 13px;font-size:11px;font-weight:600;cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-edit{background:rgba(28,46,35,.07);border:1px solid var(--border);color:var(--dark);}
.btn-edit:hover{background:rgba(28,46,35,.14);}

/* BONUS CONFIG */
.bonus-config{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 1px 5px rgba(28,46,35,.05);}
.bc-item{display:flex;flex-direction:column;gap:3px;}
.bc-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);}
.bc-val{font-family:'DM Serif Display',serif;font-size:18px;color:var(--dark);}
.bc-val.g{color:var(--lime);}
.bc-divider{width:1px;height:32px;background:var(--border);}
.bc-input-wrap{display:flex;align-items:center;gap:5px;}
.bc-input-wrap span{font-size:12px;color:var(--muted);}
.bc-input{border:1.5px solid var(--border);border-radius:6px;padding:4px 9px;font-family:'DM Serif Display',serif;font-size:16px;color:var(--dark);width:100px;}
.bc-input:focus{outline:none;border-color:var(--lime);}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.sum-card{background:var(--dark);border-radius:11px;padding:14px 16px;position:relative;overflow:hidden;}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--lime);}
.sum-card.pk::before{background:var(--pink);}
.sum-label{font-size:9px;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.sum-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--lime);}
.sum-val.pink{color:var(--pink);}
.sum-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* METRICS GRID */
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.metric-card{background:#fff;border-radius:13px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 6px rgba(28,46,35,.05);}
.mc-header{background:var(--dark);padding:12px 15px;display:flex;align-items:center;justify-content:space-between;}
.mc-title{color:#fff;font-weight:600;font-size:12px;}
.mc-weight{background:rgba(132,189,0,.2);color:var(--lime);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.mc-body{padding:14px;}
.view-mode{}
.edit-mode{display:none;}
.editing .view-mode{display:none;}
.editing .edit-mode{display:block;}

/* TARGET / ACTUAL */
.ta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ta-field .ta-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin-bottom:4px;}
.ta-wrap{display:flex;align-items:center;gap:4px;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;transition:border-color .2s;}
.ta-wrap:focus-within{border-color:var(--lime);}
.ta-prefix{font-size:11px;color:var(--muted);font-weight:600;flex-shrink:0;}
.ta-input{border:none;outline:none;font-family:'DM Serif Display',serif;font-size:15px;color:var(--dark);width:100%;min-width:0;background:transparent;}
.ta-input::placeholder{color:rgba(28,46,35,.2);font-size:13px;}

/* ATTAINMENT BAR */
.attain-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.attain-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.attain-pct{font-family:'DM Serif Display',serif;font-size:14px;}
.attain-track{height:8px;background:var(--offwhite);border-radius:8px;overflow:hidden;margin-bottom:3px;}
.attain-fill{height:100%;border-radius:8px;transition:width .4s cubic-bezier(.16,1,.3,1);}

/* SLIDER */
.slider-zone{position:relative;margin-bottom:4px;padding-bottom:26px;}
.zone-track{position:relative;height:9px;border-radius:9px;overflow:hidden;cursor:pointer;}
.zone-seg{position:absolute;top:0;height:100%;}
.slider-thumb-wrap{position:absolute;top:-6px;transform:translateX(-50%);cursor:grab;z-index:10;user-select:none;}
.slider-thumb-wrap:active{cursor:grabbing;}
.slider-thumb{width:21px;height:21px;border-radius:50%;background:#fff;border:3px solid var(--dark);box-shadow:0 2px 7px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;transition:transform .1s,border-color .2s;}
.slider-thumb-wrap:hover .slider-thumb,.slider-thumb-wrap:active .slider-thumb{transform:scale(1.12);}
.thumb-inner{width:7px;height:7px;border-radius:50%;background:var(--dark);}
.stip{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-family:'DM Serif Display',serif;font-size:11px;padding:2px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;}
.stip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--dark);}
.zlabels{position:absolute;bottom:0;left:0;right:0;}
.zlabel{position:absolute;transform:translateX(-50%);font-size:9px;color:var(--muted);}
.zlabel::before{content:'';display:block;width:1px;height:4px;background:var(--border);margin:0 auto 1px;}

/* PAYOUT BADGE */
.pbadge{display:flex;align-items:center;justify-content:space-between;border-radius:7px;padding:9px 12px;transition:background .3s;}
.pb-left .pb-label{font-size:9px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.5px;}
.pb-left .pb-desc{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;}
.pb-right{text-align:right;}
.pb-pct{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;line-height:1;}
.pb-earn{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px;}

/* EDIT FIELDS */
.ef{margin-bottom:9px;}
.ef label{display:block;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin-bottom:4px;}
.ef input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);}
.ef input:focus{outline:none;border-color:var(--lime);}
.weight-hint{font-size:9px;color:var(--muted);margin-top:3px;}
.bkt-row{display:grid;grid-template-columns:1fr 54px;gap:5px;margin-bottom:5px;align-items:center;}
.bkt-row input{padding:5px 8px;font-size:11px;}

/* PAYOUT CALC */
.payout-calc{background:#fff;border:1px solid var(--border);border-radius:13px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(28,46,35,.05);}
.pc-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
.pc-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.pc-item{background:var(--offwhite);border-radius:9px;padding:11px 13px;}
.pc-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px;margin-bottom:4px;}
.pc-val{font-family:'DM Serif Display',serif;font-size:19px;color:var(--dark);}
.pc-val.g{color:var(--lime);}
.pc-val.pk{color:var(--pink);}
.pc-sub{font-size:9px;color:var(--muted);margin-top:2px;}
.mb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mb-item{border-radius:8px;padding:10px 12px;border:1px solid transparent;}
.mb-label{font-size:9px;font-weight:600;letter-spacing:.5px;margin-bottom:3px;}
.mb-val{font-family:'DM Serif Display',serif;font-size:15px;}
.mb-sub{font-size:9px;margin-top:2px;}

/* CONTROLS ROW */
.controls-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.controls-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);}
.edit-metrics-btn{background:rgba(224,49,137,.1);border:1px solid rgba(224,49,137,.4);color:var(--pink);font-size:11px;font-weight:600;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.edit-metrics-btn:hover{background:rgba(224,49,137,.2);}
.edit-metrics-btn.on{background:var(--pink);color:#fff;}
.warn{background:rgba(245,166,35,.1);border:1px solid var(--amber);border-radius:6px;padding:6px 11px;font-size:11px;color:#8a5a00;margin-bottom:10px;display:none;}
.warn.show{display:block;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:14px;padding:26px;width:420px;max-width:92vw;box-shadow:0 20px 50px rgba(0,0,0,.2);transform:translateY(10px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--dark);margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-btn{flex:1;padding:10px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.mbtn-primary{background:var(--dark);color:#fff;border:none;}
.mbtn-primary:hover{background:#2a4233;}
.mbtn-cancel{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.mbtn-cancel:hover{border-color:var(--dark);color:var(--dark);}
.mbtn-danger{background:transparent;color:var(--red);border:1.5px solid rgba(232,59,59,.4);}
.mbtn-danger:hover{background:rgba(232,59,59,.08);}
.modal-divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="pill">J&J GLOBAL FULFILMENT</div>
    <h1>Account Manager Quarterly Bonus Dashboard</h1>
    <div class="header-sub">PERFORMANCE TRACKING · QUARTERLY TARGETS · 2026</div>
  </div>
  <div class="year-badge">FY 2026</div>
</div>
<div class="app">
  <div class="sidebar">
    <div class="sb-section">Team Members</div>
    <div class="sb-people" id="sb-people"></div>
    <button class="sb-add-btn" onclick="openAddModal()">+ Add team member</button>
    <div class="q-section">
      <div class="q-label">Quarter</div>
      <div class="q-btns">
        <button class="q-btn active" id="qbtn-Q1" onclick="setQuarter('Q1')">Q1</button>
        <button class="q-btn" id="qbtn-Q2" onclick="setQuarter('Q2')">Q2</button>
        <button class="q-btn" id="qbtn-Q3" onclick="setQuarter('Q3')">Q3</button>
        <button class="q-btn" id="qbtn-Q4" onclick="setQuarter('Q4')">Q4</button>
      </div>
    </div>
  </div>
  <div class="main" id="main-panels"></div>
</div>

<div class="modal-overlay" id="person-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Team Member</div>
    <div class="modal-sub" id="modal-sub">Add a new account manager to the dashboard</div>
    <div class="ef"><label>FULL NAME</label><input type="text" id="modal-name" placeholder="e.g. Dan"/></div>
    <div class="ef"><label>JOB TITLE</label><input type="text" id="modal-role" placeholder="e.g. Account Manager"/></div>
    <hr class="modal-divider" id="modal-divider"/>
    <div id="modal-copy-section">
      <div class="ef"><label>COPY METRICS FROM (OPTIONAL)</label>
        <select id="modal-copy-from" style="width:100%;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:12px;">
          <option value="">— Start with blank targets —</option>
        </select>
      </div>
    </div>
    <div class="modal-actions" id="modal-actions">
      <button class="modal-btn mbtn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn mbtn-primary" id="modal-confirm-btn" onclick="modalConfirm()">Add Person</button>
    </div>
  </div>
</div>

<script>
const ZONE_COLORS=['#E83B3B','#F5A623','#7BB223','#84BD00'];
const QUARTERS=['Q1','Q2','Q3','Q4'];
function dc(o){return JSON.parse(JSON.stringify(o));}

function defaultMetrics(){
  return [
    {title:'🛡 Churn / Retention',weight:40,desc:'Number of clients retained vs target',prefix:'£',
     brackets:[{r:'Below 80% of target',p:0},{r:'80–89% of target',p:50},{r:'90–99% of target',p:75},{r:'100%+ of target',p:100}],
     targets:{Q1:'',Q2:'',Q3:'',Q4:''},actuals:{Q1:'',Q2:'',Q3:'',Q4:''}},
    {title:'📈 Margin',weight:30,desc:'Gross margin % vs quarterly target',prefix:'%',
     brackets:[{r:'Below 80% of target',p:0},{r:'80–89% of target',p:50},{r:'90–99% of target',p:75},{r:'100%+ of target',p:100}],
     targets:{Q1:'',Q2:'',Q3:'',Q4:''},actuals:{Q1:'',Q2:'',Q3:'',Q4:''}},
    {title:'🚀 Upsell Gross Profit',weight:30,desc:'Upsell GP generated vs quarterly target',prefix:'£',
     brackets:[{r:'Below 80% of target',p:0},{r:'80–89% of target',p:50},{r:'90–99% of target',p:75},{r:'100%+ of target',p:100}],
     targets:{Q1:'',Q2:'',Q3:'',Q4:''},actuals:{Q1:'',Q2:'',Q3:'',Q4:''}},
  ];
}

let PEOPLE=[
  {id:'dan',   name:'Dan',   role:'Account Manager',annualBonus:6000,metrics:defaultMetrics()},
  {id:'dave',  name:'Dave',  role:'Account Manager',annualBonus:6000,metrics:defaultMetrics()},
  {id:'nick',  name:'Nick',  role:'Account Manager',annualBonus:6000,metrics:defaultMetrics()},
  {id:'laurie',name:'Laurie',role:'Account Manager',annualBonus:6000,metrics:defaultMetrics()},
  {id:'sophie',name:'Sophie',role:'Account Manager',annualBonus:6000,metrics:defaultMetrics()},
  {id:'ryan',  name:'Ryan',  role:'Account Manager',annualBonus:6000,metrics:defaultMetrics()},
];
const S={};
function initS(pid){S[pid]={editing:false};}
PEOPLE.forEach(p=>initS(p.id));
let activePid=PEOPLE[0].id,activeQ='Q1';
let modalMode='add',modalEditPid=null;

// ── MODAL ──────────────────────────────────────────────────────────────────
function openAddModal(){
  modalMode='add';modalEditPid=null;
  set('modal-title','Add Team Member');set('modal-sub','Add a new account manager');
  document.getElementById('modal-name').value='';
  document.getElementById('modal-role').value='Account Manager';
  set('modal-confirm-btn','Add Person');
  document.getElementById('modal-divider').style.display='';
  document.getElementById('modal-copy-section').style.display='';
  const sel=document.getElementById('modal-copy-from');
  sel.innerHTML='<option value="">— Start with blank targets —</option>';
  PEOPLE.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name+' — '+p.role;sel.appendChild(o);});
  const d=document.getElementById('modal-delete-btn');if(d)d.remove();
  document.getElementById('person-modal').classList.add('open');
}
function openEditModal(pid){
  const p=PEOPLE.find(x=>x.id===pid);if(!p)return;
  modalMode='edit';modalEditPid=pid;
  set('modal-title','Edit Person');set('modal-sub','Update name or job title');
  document.getElementById('modal-name').value=p.name;
  document.getElementById('modal-role').value=p.role;
  set('modal-confirm-btn','Save Changes');
  document.getElementById('modal-divider').style.display='none';
  document.getElementById('modal-copy-section').style.display='none';
  const actions=document.getElementById('modal-actions');
  let d=document.getElementById('modal-delete-btn');
  if(!d){d=document.createElement('button');d.id='modal-delete-btn';d.className='modal-btn mbtn-danger';d.textContent='Delete';actions.insertBefore(d,actions.firstChild);}
  d.onclick=()=>deletePerson(pid);
  document.getElementById('person-modal').classList.add('open');
}
function closeModal(){document.getElementById('person-modal').classList.remove('open');}
document.getElementById('person-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function modalConfirm(){
  const name=document.getElementById('modal-name').value.trim();
  const role=document.getElementById('modal-role').value.trim();
  if(!name){document.getElementById('modal-name').focus();return;}
  if(modalMode==='add'){
    const cf=document.getElementById('modal-copy-from').value;
    const src=cf?PEOPLE.find(x=>x.id===cf):null;
    const id='am_'+Date.now();
    const metrics=src?dc(src.metrics).map(m=>({...m,targets:{Q1:'',Q2:'',Q3:'',Q4:''},actuals:{Q1:'',Q2:'',Q3:'',Q4:''}})):defaultMetrics();
    PEOPLE.push({id,name,role:role||'Account Manager',annualBonus:6000,metrics});
    initS(id);activePid=id;
  } else {
    const p=PEOPLE.find(x=>x.id===modalEditPid);
    if(p){p.name=name;p.role=role||p.role;}
  }
  closeModal();fullRebuild();
}
function deletePerson(pid){
  if(PEOPLE.length<=1){alert('Need at least one person.');return;}
  if(!confirm('Remove this person?'))return;
  PEOPLE=PEOPLE.filter(p=>p.id!==pid);delete S[pid];
  activePid=PEOPLE[0].id;closeModal();fullRebuild();
}

// ── QUARTER ────────────────────────────────────────────────────────────────
function setQuarter(q){
  activeQ=q;
  QUARTERS.forEach(qq=>{const b=document.getElementById('qbtn-'+qq);if(b)b.classList.toggle('active',qq===q);});
  PEOPLE.forEach(p=>updateDisplay(p.id));
  document.querySelectorAll('.qpill').forEach(el=>el.textContent=q+' 2026');
}

// ── CALC ───────────────────────────────────────────────────────────────────
function scoreToZone(v){if(v<80)return 0;if(v<90)return 1;if(v<100)return 2;return 3;}
function calcAttain(target,actual){
  const t=parseFloat(target),a=parseFloat(actual);
  if(!t||isNaN(t)||isNaN(a))return null;
  return Math.min((a/t)*100,200);
}
function calcPerson(pid){
  const p=PEOPLE.find(x=>x.id===pid),q=activeQ,qB=p.annualBonus/4;
  let tw=0;
  const mr=p.metrics.map(m=>{
    const att=calcAttain(m.targets[q],m.actuals[q]);
    const zone=att!==null?scoreToZone(att):null;
    const bp=zone!==null?m.brackets[zone].p/100:0;
    const contrib=zone!==null?bp*(m.weight/100):0;
    tw+=contrib;
    return{att,zone,bp,contrib,earned:zone!==null?qB*contrib:0};
  });
  const anyData=mr.some(r=>r.zone!==null);
  const overallPct=anyData?Math.min(Math.round(tw*100),100):null;
  return{qB,overallPct,bonusEarned:anyData?qB*tw:0,mr,anyData};
}
function fmt(n){return'£'+Math.round(n).toLocaleString('en-GB');}
function fmtP(n){return Math.round(n)+'%';}
function barGrad(p){if(p<50)return'linear-gradient(90deg,#b02020,#E83B3B)';if(p<80)return'linear-gradient(90deg,#c47200,#F5A623)';return'linear-gradient(90deg,#7BB223,#84BD00)';}
function pctCol(p){if(p===null)return'var(--muted)';if(p<50)return'var(--red)';if(p<80)return'var(--amber)';if(p<100)return'var(--midgreen)';return'var(--lime)';}

// ── DISPLAY ────────────────────────────────────────────────────────────────
function updateDisplay(pid){
  const p=PEOPLE.find(x=>x.id===pid);
  const{qB,overallPct,bonusEarned,mr,anyData}=calcPerson(pid);
  const qBfmt=fmt(qB);

  el(pid+'-sum-qtarget',qBfmt);
  el(pid+'-sum-pct',overallPct!==null?fmtP(overallPct):'—',pctCol(overallPct));
  el(pid+'-sum-earned',anyData?fmt(bonusEarned):'—');
  el(pid+'-sum-annual',fmt(p.annualBonus));
  el(pid+'-pc-qtarget',qBfmt);
  el(pid+'-pc-pct',overallPct!==null?fmtP(overallPct):'—',pctCol(overallPct));
  el(pid+'-pc-earned',anyData?fmt(bonusEarned):'—');
  el(pid+'-pc-remain',anyData?fmt(Math.max(qB-bonusEarned,0)):'—');
  el(pid+'-pc-annual',fmt(p.annualBonus));

  const fill=document.getElementById(pid+'-ob-fill');
  if(fill){fill.style.width=(overallPct||0)+'%';fill.style.background=barGrad(overallPct||0);}
  el(pid+'-ob-pct',overallPct!==null?fmtP(overallPct):'—',pctCol(overallPct));

  p.metrics.forEach((m,i)=>{
    const{att,zone,earned}=mr[i];
    const af=document.getElementById(pid+'-af-'+i);
    const ap=document.getElementById(pid+'-ap-'+i);
    if(af){af.style.width=att!==null?Math.min(att,100)+'%':'0%';if(att!==null)af.style.background=ZONE_COLORS[zone];}
    if(ap){ap.textContent=att!==null?fmtP(att):'—';ap.style.color=zone!==null?ZONE_COLORS[zone]:'var(--muted)';}
    if(att!==null)updateSliderUI(pid,i,Math.min(att,100));
    const badge=document.getElementById(pid+'-badge-'+i);
    if(badge){
      if(zone!==null){
        badge.style.background=ZONE_COLORS[zone];
        const bd=badge.querySelector('.pb-desc'),bp=badge.querySelector('.pb-pct'),be=badge.querySelector('.pb-earn');
        if(bd)bd.textContent=m.brackets[zone].r;
        if(bp)bp.textContent=fmtP(m.brackets[zone].p);
        if(be)be.textContent=fmt(earned)+' earned this metric';
      } else {
        badge.style.background='rgba(28,46,35,.12)';
        const bd=badge.querySelector('.pb-desc'),bp=badge.querySelector('.pb-pct'),be=badge.querySelector('.pb-earn');
        if(bd)bd.textContent='Enter target & actual to calculate';
        if(bp)bp.textContent='—';if(be)be.textContent='';
      }
    }
    el(pid+'-mb-att-'+i,att!==null?fmtP(att):'—');
    el(pid+'-mb-earn-'+i,zone!==null?fmt(earned):'—');
    const mbItem=document.getElementById(pid+'-mb-item-'+i);
    if(mbItem){
      const c=zone!==null?ZONE_COLORS[zone]+'22':'rgba(28,46,35,.06)';
      const cb=zone!==null?ZONE_COLORS[zone]+'44':'var(--border)';
      mbItem.style.background=c;mbItem.style.borderColor=cb;
    }
  });

  const sbBadge=document.getElementById('sb-badge-'+pid);
  if(sbBadge){
    if(overallPct!==null){sbBadge.textContent=fmtP(overallPct);sbBadge.style.background=pctCol(overallPct);sbBadge.style.color='#fff';}
    else{sbBadge.textContent='';sbBadge.style.background='transparent';}
  }
  el(pid+'-q-bonus-cfg',fmt(qB));
  const totalW=p.metrics.reduce((a,m)=>a+m.weight,0);
  const warn=document.getElementById(pid+'-warn');
  if(warn){warn.textContent='⚠ Weights total '+totalW+'% — must equal 100%';warn.classList.toggle('show',totalW!==100);}
}

function updateSliderUI(pid,mi,v){
  const tw=document.getElementById(pid+'-thumb-'+mi);
  const tip=document.getElementById(pid+'-tip-'+mi);
  if(!tw)return;
  const c=Math.min(Math.max(v,0),100);
  tw.style.left=c+'%';
  if(tip)tip.textContent=Math.round(c);
  const zone=scoreToZone(c);
  const t=tw.querySelector('.slider-thumb');
  if(t)t.style.borderColor=ZONE_COLORS[zone];
  const track=document.getElementById(pid+'-ztrack-'+mi);
  if(!track)return;
  const segs=track.querySelectorAll('.zone-seg');
  const sd=[{s:0,e:80},{s:80,e:90},{s:90,e:100}];
  segs.forEach((seg,si)=>{
    const{s:st,e:en}=sd[si];
    if(c<=st)seg.style.background='rgba(0,0,0,0.08)';
    else if(c>=en)seg.style.background=ZONE_COLORS[si];
    else{const fp=((c-st)/(en-st))*100;seg.style.background=`linear-gradient(90deg,${ZONE_COLORS[si]} ${fp}%,rgba(0,0,0,0.08) ${fp}%)`;}
  });
}

function el(id,text,color){const e=document.getElementById(id);if(!e)return;if(text!==undefined)e.textContent=text;if(color!==undefined)e.style.color=color;}
function set(id,text){const e=document.getElementById(id);if(e)e.textContent=text;}

// ── HANDLERS ───────────────────────────────────────────────────────────────
function onTarget(pid,mi,q,v){PEOPLE.find(x=>x.id===pid).metrics[mi].targets[q]=v;updateDisplay(pid);}
function onActual(pid,mi,q,v){PEOPLE.find(x=>x.id===pid).metrics[mi].actuals[q]=v;updateDisplay(pid);}
function onAnnualBonus(pid,v){PEOPLE.find(x=>x.id===pid).annualBonus=parseFloat(v)||6000;updateDisplay(pid);}
function onEditTitle(pid,mi,v){PEOPLE.find(x=>x.id===pid).metrics[mi].title=v;el(pid+'-mtitle-'+mi,v);}
function onEditWeight(pid,mi,v){PEOPLE.find(x=>x.id===pid).metrics[mi].weight=parseInt(v)||0;el(pid+'-mweight-'+mi,(parseInt(v)||0)+'%');updateDisplay(pid);}
function onEditBktR(pid,mi,bi,v){PEOPLE.find(x=>x.id===pid).metrics[mi].brackets[bi].r=v;updateDisplay(pid);}
function onEditBktP(pid,mi,bi,v){PEOPLE.find(x=>x.id===pid).metrics[mi].brackets[bi].p=parseInt(v)||0;updateDisplay(pid);}
function toggleEdit(pid){
  S[pid].editing=!S[pid].editing;
  document.querySelectorAll('#panel-'+pid+' .metric-card').forEach(c=>c.classList.toggle('editing',S[pid].editing));
  const btn=document.getElementById('emb-'+pid);
  if(btn){btn.textContent=S[pid].editing?'✓ Done editing':'✎ Edit metrics';btn.classList.toggle('on',S[pid].editing);}
}
function showPanel(pid){
  activePid=pid;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-person').forEach(p=>p.classList.remove('active'));
  const panel=document.getElementById('panel-'+pid);
  const sp=document.getElementById('sp-'+pid);
  if(panel)panel.classList.add('active');
  if(sp)sp.classList.add('active');
}

// ── SLIDER INIT ────────────────────────────────────────────────────────────
function initSlider(pid,mi){
  const track=document.getElementById(pid+'-ztrack-'+mi);
  const thumb=document.getElementById(pid+'-thumb-'+mi);
  if(!track||!thumb)return;
  function getV(cx){const r=track.getBoundingClientRect();return Math.round(Math.min(Math.max((cx-r.left)/r.width,0),1)*100);}
  function applyV(v){
    const p=PEOPLE.find(x=>x.id===pid),m=p.metrics[mi];
    const t=parseFloat(m.targets[activeQ]);
    if(t&&!isNaN(t)){
      const na=Math.round((v/100)*t*100)/100;
      m.actuals[activeQ]=na;
      const ai=document.getElementById(pid+'-actual-'+mi);
      if(ai)ai.value=na;
    }
    updateDisplay(pid);
  }
  track.addEventListener('click',e=>applyV(getV(e.clientX)));
  let drag=false;
  thumb.addEventListener('mousedown',e=>{drag=true;e.preventDefault();});
  thumb.addEventListener('touchstart',()=>{drag=true;},{passive:true});
  document.addEventListener('mousemove',e=>{if(drag)applyV(getV(e.clientX));});
  document.addEventListener('touchmove',e=>{if(drag)applyV(getV(e.touches[0].clientX));},{passive:true});
  document.addEventListener('mouseup',()=>{drag=false;});
  document.addEventListener('touchend',()=>{drag=false;});
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

function renderMetricCard(p,m,mi){
  const q=activeQ;
  const zl=[{pos:'0%',l:'0'},{pos:'80%',l:'80'},{pos:'90%',l:'90'},{pos:'100%',l:'100'}];
  return `
  <div class="metric-card" id="${p.id}-mcard-${mi}">
    <div class="mc-header">
      <span class="mc-title" id="${p.id}-mtitle-${mi}">${m.title}</span>
      <span class="mc-weight" id="${p.id}-mweight-${mi}">${m.weight}%</span>
    </div>
    <div class="mc-body view-mode">
      <div class="ta-row">
        <div class="ta-field">
          <div class="ta-label">TARGET — ${q}</div>
          <div class="ta-wrap">
            <span class="ta-prefix">${m.prefix||'£'}</span>
            <input class="ta-input" type="number" min="0" placeholder="Set target"
              value="${m.targets[q]}"
              oninput="onTarget('${p.id}',${mi},'${q}',this.value)"
              id="${p.id}-target-${mi}"/>
          </div>
        </div>
        <div class="ta-field">
          <div class="ta-label">ACTUAL — ${q}</div>
          <div class="ta-wrap">
            <span class="ta-prefix">${m.prefix||'£'}</span>
            <input class="ta-input" type="number" min="0" placeholder="Enter actual"
              value="${m.actuals[q]}"
              oninput="onActual('${p.id}',${mi},'${q}',this.value)"
              id="${p.id}-actual-${mi}"/>
          </div>
        </div>
      </div>
      <div class="attain-row">
        <span class="attain-label">ATTAINMENT</span>
        <span class="attain-pct" id="${p.id}-ap-${mi}" style="color:var(--muted)">—</span>
      </div>
      <div class="attain-track">
        <div class="attain-fill" id="${p.id}-af-${mi}" style="width:0%;background:var(--red)"></div>
      </div>
      <div class="slider-zone">
        <div class="zone-track" id="${p.id}-ztrack-${mi}">
          <div class="zone-seg" style="left:0;width:80%;background:rgba(0,0,0,0.08)"></div>
          <div class="zone-seg" style="left:80%;width:10%;background:rgba(0,0,0,0.08)"></div>
          <div class="zone-seg" style="left:90%;width:10%;background:rgba(0,0,0,0.08)"></div>
        </div>
        <div class="slider-thumb-wrap" id="${p.id}-thumb-${mi}" style="left:0%">
          <div class="stip" id="${p.id}-tip-${mi}">0</div>
          <div class="slider-thumb"><div class="thumb-inner"></div></div>
        </div>
        <div class="zlabels">
          ${zl.map(z=>`<span class="zlabel" style="left:${z.pos}">${z.l}</span>`).join('')}
        </div>
      </div>
      <div class="pbadge" id="${p.id}-badge-${mi}" style="background:rgba(28,46,35,.12)">
        <div class="pb-left"><div class="pb-label">PAYOUT BRACKET</div><div class="pb-desc">Enter target &amp; actual to calculate</div></div>
        <div class="pb-right"><div class="pb-pct">—</div><div class="pb-earn"></div></div>
      </div>
    </div>
    <div class="mc-body edit-mode">
      <div class="ef"><label>METRIC TITLE</label><input type="text" value="${m.title}" oninput="onEditTitle('${p.id}',${mi},this.value)"/></div>
      <div class="ef"><label>WEIGHT (%)</label>
        <input type="number" min="1" max="100" value="${m.weight}" oninput="onEditWeight('${p.id}',${mi},this.value)"/>
        <div class="weight-hint">All 3 weights must sum to 100%</div></div>
      <div class="ef"><label>PAYOUT BRACKETS</label>
        ${m.brackets.map((b,bi)=>`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
          <span style="width:8px;height:8px;border-radius:50%;background:${ZONE_COLORS[bi]};flex-shrink:0;display:inline-block"></span>
          <div class="bkt-row" style="flex:1">
            <input type="text" value="${b.r}" oninput="onEditBktR('${p.id}',${mi},${bi},this.value)"/>
            <input type="number" min="0" max="100" value="${b.p}" oninput="onEditBktP('${p.id}',${mi},${bi},this.value)"/>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderPanels(){
  document.getElementById('main-panels').innerHTML=PEOPLE.map(p=>`
  <div id="panel-${p.id}" class="panel${p.id===activePid?' active':''}">
    <div class="person-header">
      <div><div class="person-name">${p.name}</div><div class="person-role">${p.role}</div></div>
      <div class="person-actions">
        <span class="qpill">${activeQ} 2026</span>
        <button class="action-btn btn-edit" onclick="openEditModal('${p.id}')">✎ Edit</button>
      </div>
    </div>
    <div class="bonus-config">
      <div class="bc-item"><div class="bc-label">ANNUAL BONUS</div>
        <div class="bc-input-wrap"><span>£</span>
          <input class="bc-input" type="number" min="0" value="${p.annualBonus}" oninput="onAnnualBonus('${p.id}',this.value)"/>
        </div>
      </div>
      <div class="bc-divider"></div>
      <div class="bc-item"><div class="bc-label">QUARTERLY TARGET</div><div class="bc-val g" id="${p.id}-q-bonus-cfg">${fmt(p.annualBonus/4)}</div></div>
      <div class="bc-divider"></div>
      <div class="bc-item"><div class="bc-label">WEIGHTING</div><div style="font-size:11px;color:var(--muted)">Churn 40% · Margin 30% · Upsell GP 30%</div></div>
    </div>
    <div class="summary-row">
      <div class="sum-card"><div class="sum-label">Q TARGET</div><div class="sum-val" id="${p.id}-sum-qtarget">${fmt(p.annualBonus/4)}</div><div class="sum-sub">this quarter</div></div>
      <div class="sum-card"><div class="sum-label">ACHIEVEMENT</div><div class="sum-val" id="${p.id}-sum-pct" style="color:var(--muted)">—</div><div class="sum-sub">weighted score</div></div>
      <div class="sum-card pk"><div class="sum-label">BONUS EARNED</div><div class="sum-val pink" id="${p.id}-sum-earned">—</div><div class="sum-sub">this quarter</div></div>
      <div class="sum-card"><div class="sum-label">ANNUAL TARGET</div><div class="sum-val" id="${p.id}-sum-annual">${fmt(p.annualBonus)}</div><div class="sum-sub">full year</div></div>
    </div>
    <div class="warn" id="${p.id}-warn"></div>
    <div class="controls-row">
      <div class="controls-label">QUARTERLY TARGETS &amp; ACTUALS</div>
      <button class="edit-metrics-btn" id="emb-${p.id}" onclick="toggleEdit('${p.id}')">✎ Edit metrics</button>
    </div>
    <div class="metrics-grid">${p.metrics.map((m,mi)=>renderMetricCard(p,m,mi)).join('')}</div>
    <div class="payout-calc">
      <div class="pc-title">QUARTERLY PAYOUT CALCULATOR</div>
      <div class="pc-row">
        <div class="pc-item"><div class="pc-label">Q BONUS TARGET</div><div class="pc-val" id="${p.id}-pc-qtarget">${fmt(p.annualBonus/4)}</div><div class="pc-sub">at 100%</div></div>
        <div class="pc-item"><div class="pc-label">OVERALL %</div><div class="pc-val g" id="${p.id}-pc-pct">—</div><div class="pc-sub">weighted score</div></div>
        <div class="pc-item"><div class="pc-label">BONUS EARNED</div><div class="pc-val g" id="${p.id}-pc-earned">—</div><div class="pc-sub">this quarter</div></div>
        <div class="pc-item"><div class="pc-label">REMAINING</div><div class="pc-val" id="${p.id}-pc-remain">—</div><div class="pc-sub">not earned</div></div>
        <div class="pc-item"><div class="pc-label">ANNUAL TARGET</div><div class="pc-val" id="${p.id}-pc-annual">${fmt(p.annualBonus)}</div><div class="pc-sub">full year</div></div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:8px">METRIC BREAKDOWN</div>
      <div class="mb-grid">
        ${p.metrics.map((m,mi)=>`
        <div class="mb-item" id="${p.id}-mb-item-${mi}" style="background:rgba(28,46,35,.06);border:1px solid var(--border)">
          <div class="mb-label" style="color:var(--dark)">${m.title}</div>
          <div class="mb-val" style="color:var(--dark)" id="${p.id}-mb-att-${mi}">—</div>
          <div class="mb-sub" style="color:var(--muted)">attain · <span id="${p.id}-mb-earn-${mi}">—</span> earned</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`).join('');
  PEOPLE.forEach(p=>p.metrics.forEach((_,mi)=>initSlider(p.id,mi)));
}

function renderSidebar(){
  document.getElementById('sb-people').innerHTML=PEOPLE.map(p=>`
    <div class="sb-person${p.id===activePid?' active':''}" id="sp-${p.id}" onclick="showPanel('${p.id}')">
      <div class="sb-avatar">${initials(p.name)}</div>
      <div class="sb-info"><div class="sb-name">${p.name}</div><div class="sb-role">${p.role}</div></div>
      <span class="sb-badge" id="sb-badge-${p.id}" style="background:transparent"></span>
      <button class="sb-edit" onclick="event.stopPropagation();openEditModal('${p.id}')" title="Edit">✎</button>
    </div>`).join('');
}

function fullRebuild(){
  renderSidebar();
  renderPanels();
  PEOPLE.forEach(p=>updateDisplay(p.id));
}

fullRebuild();
</script>
